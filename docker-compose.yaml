services:
  app:
    image: ghcr.io/rodrigobrinate/pref-drp:${APP_IMAGE_TAG:-latest}
    container_name: nomos_app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      PRISMA_DB_PUSH_ON_START: ${PRISMA_DB_PUSH_ON_START:-false}
      RUN_SEED_ON_START: ${RUN_SEED_ON_START:-false}
      DEVELOPER_ACCESS_CPFS: ${DEVELOPER_ACCESS_CPFS:-}
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-documents}
    expose:
      - "3000"
