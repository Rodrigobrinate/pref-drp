<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | Institutional Portal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#cfe6f2",
                        "tertiary-fixed-dim": "#ffb3ac",
                        "surface-bright": "#f3faff",
                        "on-tertiary-fixed": "#410003",
                        "surface-container-highest": "#cfe6f2",
                        "on-primary-fixed": "#001b3f",
                        "inverse-surface": "#1e333c",
                        "surface-dim": "#c7dde9",
                        "on-secondary-container": "#4e6874",
                        "inverse-primary": "#abc7ff",
                        "primary-container": "#00326b",
                        "on-surface-variant": "#43474f",
                        "primary-fixed": "#d7e2ff",
                        "surface-container-high": "#d5ecf8",
                        "on-secondary-fixed-variant": "#304a55",
                        "outline-variant": "#c3c6d1",
                        "secondary": "#48626e",
                        "on-primary-fixed-variant": "#00458f",
                        "primary": "#001d44",
                        "on-tertiary-container": "#ff6c63",
                        "on-tertiary": "#ffffff",
                        "outline": "#737780",
                        "tertiary": "#460003",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#6b9bef",
                        "surface-container": "#dbf1fe",
                        "on-surface": "#071e27",
                        "background": "#f3faff",
                        "tertiary-fixed": "#ffdad6",
                        "on-secondary": "#ffffff",
                        "inverse-on-surface": "#dff4ff",
                        "secondary-fixed": "#cbe7f5",
                        "secondary-fixed-dim": "#afcbd8",
                        "surface-tint": "#255dad",
                        "on-secondary-fixed": "#021f29",
                        "secondary-fixed": "#cbe7f5",
                        "surface-container-lowest": "#ffffff",
                        "surface": "#f3faff",
                        "on-tertiary-fixed-variant": "#930010",
                        "error-container": "#ffdad6",
                        "on-background": "#071e27",
                        "primary-fixed-dim": "#abc7ff",
                        "surface-container-low": "#e6f6ff",
                        "on-error": "#ffffff",
                        "tertiary-container": "#6e0009",
                        "on-error-container": "#93000a",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Public Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
        h1, h2, .brand-anchor {
            font-family: 'Public Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col relative overflow-hidden">
<!-- Background Layer with Tonal Architecture -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover opacity-20 grayscale brightness-75" data-alt="Modern minimalist architectural interior of a government building with clean glass lines, soft daylight, and professional atmosphere" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD4UImfMei6cEfFrjSuScVLr1P6dV_EfPV-g0Xi9lM18MAe0VveZoGYLn8zkMpbPsAo29DyUKGpHY64oeN7q-PJD8jZ77VbQOdlqE0l_wt5W0_Pe-s5AjbJM5gTGepu3Az5tRAoc1K4tQ_b68zrTX_mGuuBGcvDOm5QYGXsVGw4SDrvly10IrpHl8Kvm7TUSDkVYhZde2X_cn3NW-MwvNmBDomi9ueaVpL0hODSRMs5iMkZi3P4FSiejinJxFQU71uVxmJq0GmM8yA"/>
<div class="absolute inset-0 bg-gradient-to-br from-surface via-surface/90 to-surface-container-high/80"></div>
</div>
<!-- Main Content Area (Focused Transactional Journey) -->
<main class="relative z-10 flex-grow flex items-center justify-center px-6 py-12">
<div class="w-full max-w-md">
<!-- Branding Header -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center p-3 mb-6 bg-surface-container-low rounded-xl">
<span class="material-symbols-outlined text-4xl text-primary" data-icon="account_balance">account_balance</span>
</div>
<h1 class="text-3xl font-extrabold tracking-tight text-primary mb-2">Institutional Portal</h1>
<p class="text-on-surface-variant text-sm font-medium">Acesse a plataforma de gestão e serviços</p>
</div>
<!-- Login Card (The Modern Archive Layering) -->
<div class="bg-surface-container-lowest rounded-xl p-8 shadow-[0_32px_64px_-12px_rgba(7,30,39,0.06)] border border-outline-variant/10">
<form class="space-y-6">
<!-- Form Fields (Editorial Style) -->
<div class="space-y-1">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant ml-1" for="cpf">CPF</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]" data-icon="badge">badge</span>
</div>
<input class="block w-full pl-11 pr-4 py-4 bg-surface-container-highest border-none focus:ring-0 focus:outline-none rounded-lg text-on-surface placeholder:text-outline/60 transition-all border-b-2 border-transparent focus:border-primary" id="cpf" name="cpf" placeholder="Digite seu CPF" type="text"/>
</div>
</div>
<div class="space-y-1">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant ml-1" for="password">Senha</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-11 pr-4 py-4 bg-surface-container-highest border-none focus:ring-0 focus:outline-none rounded-lg text-on-surface placeholder:text-outline/60 transition-all border-b-2 border-transparent focus:border-primary" id="password" name="password" placeholder="Digite sua senha" type="password"/>
</div>
</div>
<!-- Profile Identification Badge -->
<div class="bg-secondary-container/30 py-3 px-4 rounded-full flex items-center gap-3">
<span class="material-symbols-outlined text-secondary text-[18px]" data-icon="manage_accounts">manage_accounts</span>
<p class="text-[12px] font-medium text-on-secondary-container leading-tight">
                            O sistema identifica automaticamente seu perfil: <span class="font-bold">Servidor, Chefia ou RH</span>.
                        </p>
</div>
<!-- Action Button -->
<button class="w-full py-4 px-6 bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold rounded-lg shadow-sm hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span>Entrar</span>
<span class="material-symbols-outlined text-[18px]" data-icon="login">login</span>
</button>
</form>
<!-- Tertiary Actions -->
<div class="mt-8 pt-8 flex items-center justify-between border-t border-surface-container">
<a class="text-sm font-medium text-primary hover:underline underline-offset-4 decoration-2 transition-all" href="#">Esqueceu a senha?</a>
<a class="text-sm font-medium text-primary hover:underline underline-offset-4 decoration-2 transition-all" href="#">Suporte</a>
</div>
</div>
<!-- Contextual Footer Metadata -->
<div class="mt-12 text-center">
<p class="text-xs text-on-surface-variant/60 font-medium tracking-wide">
                    © 2024 Institutional Portal — Governo Digital. 
                    <br/>Sistema de acesso seguro e auditado.
                </p>
</div>
</div>
</main>
<!-- Decoration Element: Minimalist Tonal Asymmetry -->
<div class="absolute -bottom-24 -left-24 w-96 h-96 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute -top-24 -right-24 w-64 h-64 bg-primary-container/5 rounded-full blur-3xl pointer-events-none"></div>
</body></html>
